<!DOCTYPE html><html lang="zh-CN" xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><title>Boards</title><link rel="stylesheet" th:href="@{/styles.css}"></head><body><header class="topbar"><h1>Campus Bazaar</h1><nav><a th:href="@{/}">首页</a></nav></header><main class="shell"><section class="card-grid"><article class="card" th:each="board : ${boards}"><p class="eyebrow" th:text="${board.code}"></p><h3><a th:href="@{'/boards/' + ${board.code}}" th:text="${board.name}"></a></h3><p th:text="${board.summary}"></p><div class="meta"><span th:text="${board.status}"></span><span th:text="${board.owner}"></span></div></article></section></main></body></html>
