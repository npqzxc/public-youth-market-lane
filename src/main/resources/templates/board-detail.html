<!DOCTYPE html><html lang="zh-CN" xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><title>Detail</title><link rel="stylesheet" th:href="@{/styles.css}"></head><body><header class="topbar"><h1>Campus Bazaar</h1><nav><a th:href="@{/boards}">返回</a></nav></header><main class="shell"><section class="panel" th:if="${detail != null}"><p class="eyebrow" th:text="${detail.board.code}"></p><h2 th:text="${detail.board.name}"></h2><p th:text="${detail.board.summary}"></p></section><section class="panel" th:if="${detail != null}"><table><thead><tr><th>标题</th><th>阶段</th><th>优先级</th><th>到期</th></tr></thead><tbody><tr th:each="item : ${detail.items}"><td th:text="${item.title}"></td><td th:text="${item.stage}"></td><td th:text="${item.priority}"></td><td th:text="${item.dueDate}"></td></tr></tbody></table></section><section class="panel" th:if="${detail == null}"><h2>未找到记录</h2></section></main></body></html>
